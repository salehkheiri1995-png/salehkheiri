version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: salon_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: salon_db
      POSTGRES_USER: salon_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon_user -d salon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: salon_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://salon_user:${DB_PASSWORD:-your_secure_password}@db:5432/salon_db
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_at_least_32_characters}
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # Frontend (Nginx)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: salon_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  uploads:
